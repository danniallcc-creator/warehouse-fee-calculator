<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿里国际站 · 美国海外仓费用测算工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }
        header h1 {
            font-size: 28px;
            color: #fff;
            font-weight: 600;
        }
        header p {
            color: #93c5fd;
            margin-top: 8px;
            font-size: 14px;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select {
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 10px 12px;
            color: #e2e8f0;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .form-group input::placeholder {
            color: #64748b;
        }
        .btn-calculate {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }
        .btn-calculate:active {
            transform: translateY(0);
        }
        .results-section {
            display: none;
        }
        .results-section.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        table th {
            background: #0f172a;
            color: #60a5fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #334155;
        }
        table td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        table tr:hover {
            background: #334155;
        }
        .highlight-row {
            background: #1e3a8a !important;
        }
        .highlight-row td {
            color: #fff;
            font-weight: 600;
        }
        .fee-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .fee-item {
            background: #0f172a;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            border: 1px solid #334155;
        }
        .fee-item .label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .fee-item .value {
            font-size: 22px;
            font-weight: 700;
            color: #60a5fa;
        }
        .fee-item .unit {
            font-size: 12px;
            color: #64748b;
        }
        .recommendation {
            background: linear-gradient(135deg, #065f46 0%, #047857 100%);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .recommendation h4 {
            color: #fff;
            margin-bottom: 12px;
        }
        .recommendation p {
            color: #d1fae5;
            font-size: 14px;
        }
        .zone-table {
            overflow-x: auto;
        }
        .zone-table table {
            min-width: 800px;
        }
        .zone-table th,
        .zone-table td {
            text-align: center;
            padding: 8px;
            font-size: 12px;
        }
        .error-msg {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            display: none;
        }
        .error-msg.active {
            display: block;
        }
        .optional-label {
            color: #64748b;
            font-size: 11px;
        }

        /* Auto-fetch feature */
        .link-input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .link-input-row .form-group {
            flex: 1;
        }
        .btn-fetch {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            height: 42px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-fetch:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(5, 150, 105, 0.4);
        }
        .btn-fetch:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .fetch-status {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }
        .fetch-status.loading {
            display: block;
            background: #1e3a5f;
            color: #93c5fd;
            border: 1px solid #2563eb;
        }
        .fetch-status.success {
            display: block;
            background: #064e3b;
            color: #6ee7b7;
            border: 1px solid #059669;
        }
        .fetch-status.error {
            display: block;
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #dc2626;
        }
        .auto-filled {
            border-color: #059669 !important;
            background: #064e3b22 !important;
        }
        .toggle-link {
            color: #60a5fa;
            font-size: 13px;
            cursor: pointer;
            margin-top: 12px;
            display: inline-block;
            user-select: none;
        }
        .toggle-link:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
        .manual-section {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #334155;
        }
        .manual-section.show {
            display: block;
        }
        .quick-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-top: 20px;
        }
        .quick-row .form-group {
            flex: 1;
            max-width: 250px;
        }
        .quick-row .btn-calculate {
            margin-top: 0;
            height: 42px;
            padding: 0 32px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .fetching {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>阿里国际站 · 美国海外仓费用测算工具</h1>
            <p>US Overseas Warehouse Fee Calculator for Alibaba.com Products</p>
        </header>

        <!-- Card 1: Product Link -->
        <div class="card">
            <div class="card-title">商品信息</div>
            <div class="link-input-row">
                <div class="form-group">
                    <label>商品链接 <span class="optional-label">(粘贴阿里国际站链接，自动获取尺寸重量)</span></label>
                    <input type="text" id="productLink" placeholder="https://www.alibaba.com/product-detail/...">
                </div>
                <button class="btn-fetch" id="btnFetch" onclick="fetchProductData()">获取商品信息</button>
            </div>
            <div class="fetch-status" id="fetchStatus"></div>
        </div>

        <!-- Card 2: Core Parameters -->
        <div class="card">
            <div class="card-title">核心参数</div>
            <div class="form-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="form-group">
                    <label>仓库</label>
                    <select id="warehouse">
                        <option value="US-WEST">美西 US-WEST</option>
                        <option value="USSAVA">美东南 USSAVA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>件数</label>
                    <input type="number" id="qty" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>商品名称</label>
                    <input type="text" id="productName" placeholder="自动填充或手动输入">
                </div>
            </div>
            <div class="quick-row">
                <div class="form-group">
                    <label>长 (cm)</label>
                    <input type="number" id="dimLength" step="0.1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>宽 (cm)</label>
                    <input type="number" id="dimWidth" step="0.1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>高 (cm)</label>
                    <input type="number" id="dimHeight" step="0.1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>重量 (kg)</label>
                    <input type="number" id="grossWeight" step="0.01" placeholder="0">
                </div>
                <button class="btn-calculate" onclick="calculate()">立即测算</button>
            </div>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <!-- Card 3: Advanced Options (collapsible) -->
        <div class="card">
            <span class="toggle-link" id="toggleAdvanced" onclick="toggleAdvanced()">▶ 高级选项（库龄、头程费率）</span>
            <div class="manual-section" id="advancedSection">
                <div class="form-grid" style="grid-template-columns: repeat(2, 1fr);">
                    <div class="form-group">
                        <label>库龄天数</label>
                        <input type="number" id="storageDays" value="30" min="1">
                    </div>
                    <div class="form-group">
                        <label>头程费率 <span class="optional-label">(可选, USD/kg)</span></label>
                        <input type="number" id="freightRate" step="0.01" placeholder="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="card">
                <div class="card-title">商品基本信息</div>
                <table id="basicInfoTable">
                    <tbody></tbody>
                </table>
            </div>

            <div class="card">
                <div class="card-title">费用明细</div>
                <table id="feeDetailTable">
                    <thead>
                        <tr>
                            <th>费用项目</th>
                            <th>计算方式</th>
                            <th>单价 (USD)</th>
                            <th>数量</th>
                            <th>小计 (USD)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div class="fee-summary" id="feeSummary"></div>
            </div>

            <div class="card">
                <div class="card-title">尾程派送费对比 (USD/件)</div>
                <div class="zone-table">
                    <table id="lastMileTable">
                        <thead>
                            <tr>
                                <th>物流服务商</th>
                                <th>Zone 1/2</th>
                                <th>Zone 3</th>
                                <th>Zone 4</th>
                                <th>Zone 5</th>
                                <th>Zone 6</th>
                                <th>Zone 7</th>
                                <th>Zone 8</th>
                                <th>Zone 9</th>
                                <th>均价</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-title">总费用汇总</div>
                <table id="totalCostTable">
                    <thead>
                        <tr>
                            <th>费用类别</th>
                            <th>金额 (USD)</th>
                            <th>占比</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div class="recommendation" id="recommendation"></div>
            </div>
        </div>
    </div>

        // Helper functions
        function classifyTier(weight, length, width, height) {
            const tiers = ['T25', 'T50', 'T120', 'T240', 'TM'];
            for (let tier of tiers) {
                const spec = SIZE_TIERS[tier];
                if (weight <= spec.maxWeight && length <= spec.maxL && width <= spec.maxW && height <= spec.maxH) {
                    return tier;
                }
            }
            return 'TM';
        }

        function getWeightTierIndex(weight) {
            for (let i = 0; i < WEIGHT_TIERS.length; i++) {
                if (weight <= WEIGHT_TIERS[i]) return i;
            }
            return WEIGHT_TIERS.length;
        }

        function getInboundFee(warehouse, weight) {
            const idx = getWeightTierIndex(weight);
            return INBOUND_FEE[warehouse][idx];
        }

        function getOutboundFee(warehouse, weight) {
            const idx = getWeightTierIndex(weight);
            return OUTBOUND_FEE[warehouse][idx];
        }

        function getFallbackPackaging(weight) {
            for (let p of FALLBACK_PACKAGING) {
                if (weight <= p.maxWeight) return p.fee;
            }
            return FALLBACK_PACKAGING[FALLBACK_PACKAGING.length - 1].fee;
        }

        function getStorageDailyRate(warehouse, tier, days) {
            const rates = STORAGE_FEE[warehouse][tier];
            for (let i = 0; i < AGE_TIERS.length; i++) {
                if (days <= AGE_TIERS[i]) return rates[i];
            }
            return rates[rates.length - 1];
        }

        function calculateVolume(length, width, height) {
            return (length * width * height) / 1000000; // CBM
        }

        function calculateGirth(length, width, height) {
            return length + 2 * (width + height);
        }

        function ceilToStep(value, step) {
            return Math.ceil(value / step) * step;
        }

        function lookupRate(rates, billableWeight) {
            const weights = Object.keys(rates).map(Number).sort((a, b) => a - b);
            for (let w of weights) {
                if (billableWeight <= w) return rates[w.toString()];
            }
            return null;
        }

        // USPS calculation
        function calculateUSPS(weight, length, width, height) {
            const volWeight = (length * width * height) / 6000;
            const volume = calculateVolume(length, width, height);
            const billableWeight = Math.max(weight, volWeight);
            const roundedWeight = ceilToStep(billableWeight, 0.45);

            const rates = lookupRate(USPS_RATES, roundedWeight);
            if (!rates) return null;

            // Surcharges
            let surcharge = 0;
            let notes = [];

            if (length > 76) {
                surcharge += 8.4;
                notes.push('超限 +8.4');
            } else if (length > 55) {
                surcharge += 4;
                notes.push('超长 +4');
            }

            if (length > 55 || volume > 0.028) {
                surcharge += 1.5;
                notes.push('超尺 +1.5');
            }

            if (volume > 0.055) {
                surcharge += 18;
                notes.push('超体积 +18');
            }

            return rates.map(r => r + surcharge);
        }

        // FedEx calculation
        function calculateFedEx(weight, length, width, height, zone) {
            const volWeight = (length * width * height) / 8000;
            const billableWeight = Math.max(weight, volWeight);
            const roundedWeight = ceilToStep(billableWeight, 0.45);

            const rates = lookupRate(FEDEX_RATES, roundedWeight);
            if (!rates) return { base: null, surcharge: 0, total: null };

            const girth = calculateGirth(length, width, height);
            const zoneIdx = Math.max(0, Math.min(zone - 2, 6));

            let surcharge = 0;
            let notes = [];

            if (girth > 330.2) {
                const oversize = [81.6, 88, 88, 102.4, 102.4, 105.6, 105.6];
                surcharge = oversize[zoneIdx] * 1.25;
                notes.push('超尺');
            } else {
                if (length >= 121.92 || width > 76.2 || height > 76.2 || girth >= 266.7) {
                    const oversize = [9.44, 10.48, 10.48, 12.32, 12.32, 13.04, 13.04];
                    surcharge += oversize[zoneIdx] * 1.25;
                    notes.push('超长');
                }
                if (weight > 22.5) {
                    const overweight = [14.72, 16.08, 16.08, 18, 18, 18.8, 18.8];
                    surcharge += overweight[zoneIdx] * 1.25;
                    notes.push('超重');
                }
            }

            surcharge += 0.25 * 1.25; // Fuel

            return {
                base: rates,
                surcharge: surcharge,
                total: rates.map(r => r + surcharge),
                notes: notes.join(', ')
            };
        }

        // UPS calculation
        function calculateUPS(weight, length, width, height, zone) {
            const volWeight = (length * width * height) / 8000;
            const volume = calculateVolume(length, width, height);
            const billableWeight = Math.max(weight, volWeight);
            const roundedWeight = ceilToStep(billableWeight, 0.45);

            const rates = lookupRate(UPS_RATES, roundedWeight);
            if (!rates) return { base: null, surcharge: 0, total: null };

            const girth = calculateGirth(length, width, height);
            const zoneIdx = Math.max(0, Math.min(zone - 2, 6));

            let surcharge = 0;
            let notes = [];

            if (girth > 330.2) {
                const oversize = [178.15, 192.15, 192.15, 224.35, 224.35, 231.7, 231.7];
                surcharge = oversize[zoneIdx] * 1.25;
                notes.push('超尺');

                    surcharge += oversize[zoneIdx] * 1.25;
                    notes.push('超长');

            const weightPatterns = [
                /(?:gross\s*weight|total\s*weight|weight|net\s*weight)[:\s]*(\d+(?:\.\d+)?)\s*(?:kg|KG|kilogram)/i,
                /(\d+(?:\.\d+)?)\s*(?:kg|KG)/i,
                /(?:gross\s*weight|total\s*weight|weight)[:\s]*(\d+(?:\.\d+)?)\s*(?:lbs?|pound)/i
            ];

            for (const pat of weightPatterns) {
                const match = text.match(pat);
                if (match) {
                    let w = parseFloat(match[1]);
                    if (pat.source.includes('lbs') || pat.source.includes('pound')) {
                        w = w * 0.4536;
                    }
                    if (w > 0.01 && w < 500) {
                        result.weight = w;
                        break;
                    }
                }
            }

            if (!result.weight) {
                const wmatch = text.match(/(\d+\.\d{1,2})\s*kg/i);
                if (wmatch) {
                    const w = parseFloat(wmatch[1]);
                    if (w > 0.01 && w < 500) result.weight = w;
                }
            }

            return result;
        }

        function extractFromHtml(htmlText) {
            const result = { length: null, width: null, height: null, weight: null, name: null };

            // Extract title
            const titleMatch = htmlText.match(/<title[^>]*>([^<]+)<\/title>/i);
            if (titleMatch) {
                result.name = titleMatch[1].replace(/\s*\|.*$/i, '').replace(/\s*-.*$/i, '').trim();
            }
            const ogMatch = htmlText.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)/i);
            if (ogMatch) result.name = ogMatch[1].trim();

            // Try JSON-LD
            const jsonLdRegex = /<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi;
            let jm;
            while ((jm = jsonLdRegex.exec(htmlText)) !== null) {
                try {
                    const data = JSON.parse(jm[1]);
                    const items = Array.isArray(data) ? data : [data];
                    for (const item of items) {
                        if (item.name && !result.name) result.name = item.name;
                        if (item.weight) {
                            const w = typeof item.weight === 'object' ? item.weight.value : item.weight;
                            const wn = parseNumber(String(w));
                            if (wn && !result.weight) result.weight = wn;
                        }
                        if (item.additionalProperty) {
                            const props = Array.isArray(item.additionalProperty) ? item.additionalProperty : [item.additionalProperty];
                            for (const prop of props) {
                                const name = (prop.name || '').toLowerCase();
                                const val = String(prop.value || '');
                                if (name.includes('weight') && !result.weight) {
                                    const w = parseNumber(val);
                                    if (w) result.weight = w;
                                }
                                const dimMatch = val.match(/(\d+(?:\.\d+)?)\s*[xX×]\s*(\d+(?:\.\d+)?)\s*[xX×]\s*(\d+(?:\.\d+)?)\s*(?:cm)?/i);
                                if (dimMatch && !result.length) {
                                    const vals = [parseFloat(dimMatch[1]), parseFloat(dimMatch[2]), parseFloat(dimMatch[3])];
                                    vals.sort((a, b) => b - a);
                                    result.length = vals[0];
                                    result.width = vals[1];
                                    result.height = vals[2];
                                }
                            }
                        }
                    }
                } catch (e) {}
            }

            // Try window.__INIT_DATA and runParams
            const dataRegex = /(?:window\.__INIT_DATA\s*=\s*|runParams\s*=\s*)(\{[\s\S]*?\});/g;
            let dm;
            while ((dm = dataRegex.exec(htmlText)) !== null) {
                try {
                    const data = JSON.parse(dm[1]);
                    const str = JSON.stringify(data);
                    const parsed = parseDimensions(str);
                    for (const k of Object.keys(result)) {
                        if (!result[k] && parsed[k]) result[k] = parsed[k];
                    }
                } catch (e) {}
            }

            // Search in attribute-value patterns
            const attrPatterns = [
                /(?:Single\s+package\s+size|Package\s+size|Carton\s+size|Product\s+size|Item\s+size)[^:]*[:\s]*([^<"\n]+)/i,
                /(?:Gross\s+weight|Total\s+weight|Single\s+gross\s+weight|Package\s+weight)[^:]*[:\s]*([^<"\n]+)/i,
                /(?:Package|Carton|Box)\s+(?:dimension|size|measurement)[^:]*[:\s]*([^<"\n]+)/i
            ];
            for (const pat of attrPatterns) {
                const m = htmlText.match(pat);
                if (m) {
                    const val = m[1].trim();
                    const parsed = parseDimensions(val);
                    for (const k of Object.keys(result)) {
                        if (!result[k] && parsed[k]) result[k] = parsed[k];
                    }
                }
            }

            // Search all text for dimensions
            if (!result.length) {
                const allDimMatch = htmlText.match(/(\d+(?:\.\d+)?)\s*[xX×*]\s*(\d+(?:\.\d+)?)\s*[xX×*]\s*(\d+(?:\.\d+)?)\s*(?:cm|CM)/g);
                if (allDimMatch) {
                    for (const m of allDimMatch) {
                        const parsed = parseDimensions(m);
                        if (parsed.length && parsed.length > 5) {
                            result.length = parsed.length;
                            result.width = parsed.width;
                            result.height = parsed.height;
                            break;
                        }
                    }
                }
            }

            // Search for weight in table cells / spans
            if (!result.weight) {
                const weightCellPatterns = [
                    />(\d+(?:\.\d+)?)\s*(?:kg|KG|kilogram)\s*</i,
                    /["':]\s*(\d+\.\d{2})\s*kg/i,
                    /(?:weight|Weight|WEIGHT)\s*(?:\([^)]*\))?\s*[:=]\s*(\d+(?:\.\d+)?)\s*(?:kg|KG)/i
                ];
                for (const pat of weightCellPatterns) {
                    const m = htmlText.match(pat);
                    if (m) {
                        const w = parseFloat(m[1]);
                        if (w > 0.01 && w < 500) {
                            result.weight = w;
                            break;
                        }
                    }
                }
            }

            return result;
        }

        async function fetchProductData() {
            const linkInput = document.getElementById('productLink');
            const link = linkInput.value.trim();
            const btn = document.getElementById('btnFetch');
            const statusEl = document.getElementById('fetchStatus');

            if (!link) {
                showFetchStatus('请输入商品链接', 'error');
                return;
            }

            if (!link.includes('alibaba.com') && !link.includes('1688.com')) {
                showFetchStatus('仅支持阿里国际站 (alibaba.com) 的商品链接', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '抓取中...';
            btn.classList.add('fetching');
            showFetchStatus('正在获取商品信息，请稍候...', 'loading');

            let pageText = '';
            let success = false;

            for (const makeProxy of CORS_PROXIES) {
                try {
                    const proxyUrl = makeProxy(link);
                    const resp = await fetch(proxyUrl, {
                        signal: AbortSignal.timeout(20000)
                    });
                    if (resp.ok) {
                        pageText = await resp.text();
                        if (pageText.length > 500) {
                            success = true;
                            break;
                        }
                    }
                } catch (e) {
                    continue;
                }
            }

            btn.disabled = false;
            btn.textContent = '获取商品信息';
            btn.classList.remove('fetching');

            if (!success || !pageText) {
                showFetchStatus('获取失败，请手动填写商品尺寸和重量信息，或检查链接是否正确。', 'error');
                return;
            }

            const data = extractFromHtml(pageText);
            autoFill(data);
        }

        function autoFill(data) {
            const fields = ['length', 'width', 'height', 'weight'];
            const mapping = {
                length: 'dimLength',
                width: 'dimWidth',
                height: 'dimHeight',
                weight: 'grossWeight'
            };
            let filled = [];

            for (const key of fields) {
                if (data[key] && data[key] > 0) {
                    const el = document.getElementById(mapping[key]);
                    el.value = data[key];
                    el.classList.add('auto-filled');
                    setTimeout(() => el.classList.remove('auto-filled'), 3000);
                    const labels = { length: '长', width: '宽', height: '高', weight: '重量' };
                    const units = { length: 'cm', width: 'cm', height: 'cm', weight: 'kg' };
                    filled.push(`${labels[key]}: ${data[key]} ${units[key]}`);
                }
            }

            if (data.name) {
                const nameEl = document.getElementById('productName');
                nameEl.value = data.name.substring(0, 80);
            }

            if (filled.length > 0) {
                showFetchStatus(`自动填充成功 — ${filled.join(' | ')}。请选择仓库后点击"立即测算"。`, 'success');
            } else {
                showFetchStatus('已打开页面但未识别到尺寸/重量，请手动填写。部分商品规格需要页面JS渲染后才可见。', 'error');
            }
        }

        function calculate() {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.remove('active');

            const name = document.getElementById('productName').value || '未命名商品';
            const length = parseFloat(document.getElementById('dimLength').value) || 0;
            const width = parseFloat(document.getElementById('dimWidth').value) || 0;
            const height = parseFloat(document.getElementById('dimHeight').value) || 0;
            const weight = parseFloat(document.getElementById('grossWeight').value) || 0;
            const qty = parseInt(document.getElementById('qty').value) || 1;
            const warehouse = document.getElementById('warehouse').value;
            const storageDays = parseInt(document.getElementById('storageDays').value) || 30;
            const freightRate = parseFloat(document.getElementById('freightRate').value) || 0;

            // Validation
            if (length <= 0 || width <= 0 || height <= 0 || weight <= 0) {
                errorMsg.textContent = '请输入有效的尺寸和重量信息';
                errorMsg.classList.add('active');
                return;
            }

            // Classify tier
            const tier = classifyTier(weight, length, width, height);
            const volume = calculateVolume(length, width, height);
            const girth = calculateGirth(length, width, height);

            // Calculate fees
            const inboundFee = getInboundFee(warehouse, weight);
            const outboundFee = getOutboundFee(warehouse, weight);
            const unloadingFee = UNLOADING_FEE * volume;
            const packagingFee = qty > 1 ? getFallbackPackaging(weight) : 0;
            const storageDailyRate = getStorageDailyRate(warehouse, tier, storageDays);
            const storageFee = storageDailyRate * volume * storageDays;
            const freightFee = freightRate > 0 ? freightRate * weight : 0;

            // Display basic info
            const basicInfoTable = document.getElementById('basicInfoTable').getElementsByTagName('tbody')[0];
            basicInfoTable.innerHTML = `
                <tr><td><strong>商品名称</strong></td><td>${name}</td><td><strong>SKU尺寸等级</strong></td><td>${tier}</td></tr>
                <tr><td><strong>尺寸 (cm)</strong></td><td>${length} x ${width} x ${height}</td><td><strong>体积 (CBM)</strong></td><td>${volume.toFixed(4)}</td></tr>
                <tr><td><strong>重量 (kg)</strong></td><td>${weight.toFixed(2)}</td><td><strong>围长 (cm)</strong></td><td>${girth.toFixed(1)}</td></tr>
                <tr><td><strong>件数</strong></td><td>${qty}</td><td><strong>仓库</strong></td><td>${warehouse}</td></tr>
                <tr><td><strong>库龄天数</strong></td><td>${storageDays}</td><td><strong>仓储日费率</strong></td><td>${storageDailyRate.toFixed(2)} USD/CBM/天</td></tr>
            `;

            // Display fee details
            const feeDetailTable = document.getElementById('feeDetailTable').getElementsByTagName('tbody')[0];
            const totalInbound = inboundFee * qty;
            const totalOutbound = outboundFee * qty;
            const totalUnloading = unloadingFee * qty;
            const totalPackaging = packagingFee * qty;
            const totalStorage = storageFee * qty;

            feeDetailTable.innerHTML = `
                <tr>
                    <td>头程运费</td>
                    <td>${freightRate.toFixed(2)} USD/kg x ${weight.toFixed(2)} kg</td>
                    <td>${freightRate.toFixed(2)}</td>
                    <td>${qty}</td>
                    <td>${freightFee.toFixed(2)}</td>
                </tr>
                <tr>
                    <td>入库操作费</td>
                    <td>${weight.toFixed(2)} kg 档位</td>
                    <td>${inboundFee.toFixed(2)}</td>
                    <td>${qty}</td>
                    <td>${totalInbound.toFixed(2)}</td>
                </tr>
                <tr>
                    <td>出库操作费</td>
                    <td>${weight.toFixed(2)} kg 档位</td>
                    <td>${outboundFee.toFixed(2)}</td>
                    <td>${qty}</td>
                    <td>${totalOutbound.toFixed(2)}</td>
                </tr>
                <tr>
                    <td>卸货费</td>
                    <td>${volume.toFixed(4)} CBM x 5.6 USD</td>
                    <td>${unloadingFee.toFixed(2)}</td>
                    <td>${qty}</td>
                    <td>${totalUnloading.toFixed(2)}</td>
                </tr>
                <tr>
                    <td>仓租费</td>
                    <td>${storageDailyRate.toFixed(2)} x ${volume.toFixed(4)} CBM x ${storageDays} 天</td>
                    <td>${(storageDailyRate * volume).toFixed(4)}</td>
                    <td>${qty}</td>
                    <td>${totalStorage.toFixed(2)}</td>
                </tr>
                ${qty > 1 ? `<tr>
                    <td>兜底包材费</td>
                    <td>${weight.toFixed(2)} kg 档位</td>
                    <td>${packagingFee.toFixed(2)}</td>
                    <td>${qty}</td>
                    <td>${totalPackaging.toFixed(2)}</td>
                </tr>` : ''}
            `;

            // Fee summary
            const fixedFees = freightFee + totalInbound + totalOutbound + totalUnloading + totalStorage + totalPackaging;
            document.getElementById('feeSummary').innerHTML = `
                <div class="fee-item">
                    <div class="label">头程运费</div>
                    <div class="value">${freightFee.toFixed(2)}</div>
                    <div class="unit">USD</div>
                </div>
                <div class="fee-item">
                    <div class="label">入库费</div>
                    <div class="value">${totalInbound.toFixed(2)}</div>
                    <div class="unit">USD</div>
                </div>
                <div class="fee-item">
                    <div class="label">出库费</div>
                    <div class="value">${totalOutbound.toFixed(2)}</div>
                    <div class="unit">USD</div>
                </div>
                <div class="fee-item">
                    <div class="label">仓租费</div>
                    <div class="value">${totalStorage.toFixed(2)}</div>
                    <div class="unit">USD</div>
                </div>
                <div class="fee-item">
                    <div class="label">固定费用合计</div>
                    <div class="value">${fixedFees.toFixed(2)}</div>
                    <div class="unit">USD</div>
                </div>
            `;

            // Last-mile comparison
            const uspsResult = calculateUSPS(weight, length, width, height);
            const fedexResult = calculateFedEx(weight, length, width, height, 5);
            const upsResult = calculateUPS(weight, length, width, height, 5);

            const lastMileTable = document.getElementById('lastMileTable').getElementsByTagName('tbody')[0];
            lastMileTable.innerHTML = '';

            // USPS row
            if (uspsResult && length <= 76 && girth <= 274 && weight <= 31.5) {
                const avg = uspsResult.reduce((a, b) => a + b, 0) / uspsResult.length;
                lastMileTable.innerHTML += `
                    <tr>
                        <td><strong>USPS Ground Advantage</strong></td>
                        <td>${uspsResult[0].toFixed(2)}</td>
                        <td>${uspsResult[1].toFixed(2)}</td>
                        <td>${uspsResult[2].toFixed(2)}</td>
                        <td>${uspsResult[3].toFixed(2)}</td>
                        <td>${uspsResult[4].toFixed(2)}</td>
                        <td>${uspsResult[5].toFixed(2)}</td>
                        <td>${uspsResult[6].toFixed(2)}</td>
                        <td>${uspsResult[7].toFixed(2)}</td>
                        <td><strong>${avg.toFixed(2)}</strong></td>
                        <td>可用</td>
                    </tr>
                `;
            } else {
                lastMileTable.innerHTML += `
                    <tr>
                        <td><strong>USPS Ground Advantage</strong></td>
                        <td colspan="9">超出限制 (最长76cm, 围长274cm, 重量31.5kg)</td>
                        <td>不可用</td>
                    </tr>
                `;
            }

            // FedEx row
            if (fedexResult.total && length <= 274 && girth <= 419 && weight <= 67.5) {
                const avg = fedexResult.total.reduce((a, b) => a + b, 0) / fedexResult.total.length;
                lastMileTable.innerHTML += `
                    <tr>
                        <td><strong>FedEx Home Delivery</strong></td>
                        <td>${fedexResult.total[0].toFixed(2)}</td>
                        <td>${fedexResult.total[1].toFixed(2)}</td>
                        <td>${fedexResult.total[2].toFixed(2)}</td>
                        <td>${fedexResult.total[3].toFixed(2)}</td>
                        <td>${fedexResult.total[4].toFixed(2)}</td>
                        <td>${fedexResult.total[5].toFixed(2)}</td>
                        <td>${fedexResult.total[6].toFixed(2)}</td>
                        <td>-</td>
                        <td><strong>${avg.toFixed(2)}</strong></td>
                        <td>可用 ${fedexResult.notes}</td>
                    </tr>
                `;
            } else {
                lastMileTable.innerHTML += `
                    <tr>
                        <td><strong>FedEx Home Delivery</strong></td>
                        <td colspan="9">超出限制 (最长274cm, 围长419cm, 重量67.5kg)</td>
                        <td>不可用</td>
                    </tr>
                `;
            }

            // UPS row
            if (upsResult.total && length <= 274 && girth <= 419 && weight <= 67.5) {
                const avg = upsResult.total.reduce((a, b) => a + b, 0) / upsResult.total.length;
                lastMileTable.innerHTML += `
                    <tr>
                        <td><strong>UPS Ground</strong></td>
                        <td>${upsResult.total[0].toFixed(2)}</td>
                        <td>${upsResult.total[1].toFixed(2)}</td>
                        <td>${upsResult.total[2].toFixed(2)}</td>
                        <td>${upsResult.total[3].toFixed(2)}</td>
                        <td>${upsResult.total[4].toFixed(2)}</td>
                        <td>${upsResult.total[5].toFixed(2)}</td>
                        <td>${upsResult.total[6].toFixed(2)}</td>
                        <td>-</td>
                        <td><strong>${avg.toFixed(2)}</strong></td>
                        <td>可用 ${upsResult.notes}</td>
                    </tr>
                `;
            } else {
                lastMileTable.innerHTML += `
                    <tr>
                        <td><strong>UPS Ground</strong></td>
                        <td colspan="9">超出限制 (最长274cm, 围长419cm, 重量67.5kg)</td>
                        <td>不可用</td>
                    </tr>
                `;
            }

            // Total cost summary
            const lastMileOptions = [];
            if (uspsResult && length <= 76 && girth <= 274 && weight <= 31.5) {
                lastMileOptions.push({
                    name: 'USPS',
                    avg: uspsResult.reduce((a, b) => a + b, 0) / uspsResult.length
                });
            }
            if (fedexResult.total && length <= 274 && girth <= 419 && weight <= 67.5) {
                lastMileOptions.push({
                    name: 'FedEx',
                    avg: fedexResult.total.reduce((a, b) => a + b, 0) / fedexResult.total.length
                });
            }
            if (upsResult.total && length <= 274 && girth <= 419 && weight <= 67.5) {
                lastMileOptions.push({
                    name: 'UPS',
                    avg: upsResult.total.reduce((a, b) => a + b, 0) / upsResult.total.length
                });
            }

            const totalCostTable = document.getElementById('totalCostTable').getElementsByTagName('tbody')[0];
            totalCostTable.innerHTML = '';

            lastMileOptions.forEach(option => {
                const lastMileTotal = option.avg * qty;
                const grandTotal = fixedFees + lastMileTotal;
                totalCostTable.innerHTML += `
                    <tr>
                        <td><strong>${option.name} 方案</strong></td>
                        <td colspan="2"></td>
                    </tr>
                    <tr>
                        <td>  固定费用 (头程+仓储+操作)</td>
                        <td>${fixedFees.toFixed(2)}</td>
                        <td>${((fixedFees / grandTotal) * 100).toFixed(1)}%</td>
                    </tr>
                    <tr>
                        <td>  尾程派送费 (${option.name})</td>
                        <td>${lastMileTotal.toFixed(2)}</td>
                        <td>${((lastMileTotal / grandTotal) * 100).toFixed(1)}%</td>
                    </tr>
                    <tr class="highlight-row">
                        <td><strong>总计</strong></td>
                        <td><strong>${grandTotal.toFixed(2)}</strong></td>
                        <td><strong>100%</strong></td>
                    </tr>
                `;
            });

            // Recommendation
            if (lastMileOptions.length > 0) {
                lastMileOptions.sort((a, b) => a.avg - b.avg);
                const best = lastMileOptions[0];
                const bestTotal = fixedFees + best.avg * qty;
                const perUnit = bestTotal / qty;

                document.getElementById('recommendation').innerHTML = `
                    <h4>推荐方案</h4>
                    <p>根据测算结果,建议使用 <strong>${best.name}</strong> 作为尾程物流服务商。</p>
                    <p>总成本: <strong>${bestTotal.toFixed(2)} USD</strong> (共 ${qty} 件)</p>
                    <p>单件成本: <strong>${perUnit.toFixed(2)} USD/件</strong></p>
                    <p>尾程均价: <strong>${best.avg.toFixed(2)} USD/件</strong> (8区平均)</p>
                `;
            }

            document.getElementById('resultsSection').classList.add('active');
        }
